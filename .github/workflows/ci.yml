name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (CPU-only)
        run: uv sync --extra dev

      - name: Unit tests
        run: uv run pytest -m "not slow" --cov=qwarm

      - name: Offline-operation test
        run: uv run pytest tests/test_offline.py -v

      - name: Headless demo smoke test
        run: uv run pytest tests/test_demo_smoke.py -v

      - name: Claims verification gate
        run: uv run python verify_demo_claims.py
